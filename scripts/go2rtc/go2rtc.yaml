# go2rtc configuration — RTSP gateway for Stratos Vision
#
# Streams are pulled from RTSP cameras and republished as HLS, WebRTC, etc.
# The app fetches HLS at one of:
#   https://localhost:1985/api/stream.m3u8?src=<name>   (TLS, no mixed-content warning)
#   http://localhost:1984/api/stream.m3u8?src=<name>    (plain, localhost exemption)

# --- Streams ---
# Add one entry per camera.
streams:
  # #media=video skips the audio track — works around a broken Content-Base
  # header this camera sends (ANJVISION firmware, LIVE555 server).
  cam1: rtsp://admin:123456@192.168.0.148:554/mpeg4/ch1/main/av_stream#media=video
  # Add more cameras here:
  # cam2: rtsp://admin:password@192.168.0.149:554/...
  # Synthetic test pattern (no camera needed, works offline):
  # test: ffmpeg:testsrc2=size=1280x720:rate=15

# --- HTTP API + HLS ---
api:
  listen: :1984
  # TLS listener on a second port. Uses the same cert generated for the
  # local Node server (covers localhost, 127.0.0.1, 192.168.0.145).
  # Generate with:
  #   MSYS2_ARG_CONV_EXCL="*" openssl req -x509 -newkey rsa:2048 -nodes \
  #     -keyout 192.168.0.145-key.pem -out 192.168.0.145.pem -days 365 \
  #     -subj "/CN=192.168.0.145" \
  #     -addext "subjectAltName=IP:192.168.0.145,IP:127.0.0.1,DNS:localhost"
  # Then copy the two .pem files into this directory (scripts/go2rtc/).
  tls_listen: :1985
  tls_cert: ../../192.168.0.145.pem
  tls_key: ../../192.168.0.145-key.pem
  # CORS: allow the deployed app (https) + local dev. go2rtc echoes the
  # request Origin if it matches; "*" wildcards also work.
  origin: "*"

# --- HLS playback ---
hls:
  # go2rtc serves HLS at /api/stream.m3u8?src=<stream_name>
  # No extra config needed — HLS is enabled by default when api is on.

# --- WebRTC (optional, lower latency) ---
webrtc:
  listen: :8555/tcp
  candidates:
    - stun:8555

# --- Logging ---
log:
  level: info
